{% extends "auctions/layout.html" %}
{% load static %}
{% block body %}
    <h2>Closed Listings</h2>
    {% if not auctions %}
        <p>There is no closed listings.</p>
    {% else %}
        {% for auction in auctions %}
        <ul class="list-group">
            {% include "auctions/auction_item.html" %}
        </ul>
        {% endfor %}
    {% endif %}
    <a href="{% url 'index' %}">Back to Active Listings</a>
{% endblock %}
