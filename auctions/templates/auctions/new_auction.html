{% extends "auctions/layout.html" %}
{% load static %}
{% block body %}
    <h2>Create New Auction</h2>
    <form action="{% url 'new_auction' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="title" class="form-label">Auction Title</label>
            <input class="form-control" type="text" name="title" required>
        </div>
        <div class="form-group">
            <label for="description" class="form-label">Auction Description</label>
            <textarea class="form-control" name="description" required></textarea>
        </div>
        <div class="form-group">
            <label for="starting_bid" class="form-label">Starting Bid</label>
            <input class="form-control" type="number" name="starting_bid" required>
        </div>
        <div class="form-group">
            <label for="image_url" class="form-label">Image URL (optional)</label>
            <input class="form-control" type="text" name="image_url">
        </div>
        <div class="form-group">
            <label for="category" class="form-label">Category (optional)</label>
            <select name="category" id="category">
                <option value="">-- Select a category --</option>
                {% for cat in categories %}<option value="{{ cat.id }}">{{ cat }}</option>{% endfor %}
            </select>
        </div>
        <input class="btn btn-primary" type="submit" value="Create Auction">
    </form>
    <a href="{% url 'index' %}">Go back to active listings.</a>
{% endblock %}
