{% extends "auctions/layout.html" %}
{% load static %}
{% block body %}
    <h2>Active Listings</h2>
    {% if not auctions %}
        <p>No active listings available.</p>
    {% else %}
        <ul class="list-group">
            {% for auction in auctions %}
                {% include "auctions/auction_item.html" %}
            {% endfor %}
        </ul>
    {% endif %}
{% endblock %}
